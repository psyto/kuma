<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="SF Mono, Fira Code, monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#666"/></marker>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f0b040"/></marker>
  </defs>
  <rect width="900" height="600" fill="#0a0a0f" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" fill="#e0e0e0" font-size="20" text-anchor="middle" font-weight="bold">🐻 Kuma Vault — Architecture</text>

  <!-- User -->
  <rect x="350" y="60" width="200" height="40" rx="8" fill="none" stroke="#666" stroke-width="1.5"/>
  <text x="450" y="85" fill="#ccc" font-size="13" text-anchor="middle">User (USDC)</text>

  <!-- Arrow down -->
  <line x1="450" y1="100" x2="450" y2="130" stroke="#666" marker-end="url(#arrow)"/>

  <!-- Voltr Vault -->
  <rect x="250" y="130" width="400" height="50" rx="8" fill="#111118" stroke="#333" stroke-width="1.5"/>
  <text x="270" y="148" fill="#f0b040" font-size="10">ON-CHAIN</text>
  <text x="450" y="168" fill="#ccc" font-size="13" text-anchor="middle">Voltr Vault — Deposits, LP Shares, Fees</text>

  <!-- Arrow down -->
  <line x1="450" y1="180" x2="450" y2="200" stroke="#666" marker-end="url(#arrow)"/>

  <!-- Drift Adaptor -->
  <rect x="250" y="200" width="400" height="50" rx="8" fill="#111118" stroke="#333" stroke-width="1.5"/>
  <text x="270" y="218" fill="#f0b040" font-size="10">ON-CHAIN</text>
  <text x="450" y="238" fill="#ccc" font-size="13" text-anchor="middle">Drift Adaptor — Bridges Vault ↔ Drift v2</text>

  <!-- Arrow down -->
  <line x1="450" y1="250" x2="450" y2="280" stroke="#f0b040" stroke-width="2" marker-end="url(#arrowGold)"/>
  <text x="460" y="272" fill="#f0b040" font-size="10">THE ALPHA</text>

  <!-- Keeper Bot (main box) -->
  <rect x="50" y="280" width="800" height="280" rx="12" fill="#0f0f18" stroke="#f0b040" stroke-width="2"/>
  <text x="70" y="305" fill="#f0b040" font-size="14" font-weight="bold">Kuma Keeper Bot (Off-Chain)</text>

  <!-- Emergency Monitor -->
  <rect x="70" y="320" width="230" height="70" rx="6" fill="#1a1018" stroke="#e03131" stroke-width="1"/>
  <text x="80" y="340" fill="#e03131" font-size="11" font-weight="bold">Emergency Monitor (30s)</text>
  <text x="80" y="358" fill="#999" font-size="10">• Health ratio check</text>
  <text x="80" y="373" fill="#999" font-size="10">• Drawdown 3% / 5% triggers</text>

  <!-- Leverage Controller -->
  <rect x="320" y="320" width="250" height="70" rx="6" fill="#111118" stroke="#5fb3d4" stroke-width="1"/>
  <text x="330" y="340" fill="#5fb3d4" font-size="11" font-weight="bold">Leverage Controller (15m)</text>
  <text x="330" y="358" fill="#999" font-size="10">• SOL-PERP Parkinson vol</text>
  <text x="330" y="373" fill="#999" font-size="10">• Regime → 2x / 1.5x / 1x / 0.5x / 0x</text>

  <!-- Funding Scanner -->
  <rect x="590" y="320" width="240" height="70" rx="6" fill="#111118" stroke="#40c057" stroke-width="1"/>
  <text x="600" y="340" fill="#40c057" font-size="11" font-weight="bold">Funding Scanner (15m)</text>
  <text x="600" y="358" fill="#999" font-size="10">• 70+ markets ranked</text>
  <text x="600" y="373" fill="#999" font-size="10">• Cost gate: funding > fees</text>

  <!-- Position Manager -->
  <rect x="70" y="410" width="350" height="70" rx="6" fill="#111118" stroke="#f0b040" stroke-width="1"/>
  <text x="80" y="430" fill="#f0b040" font-size="11" font-weight="bold">Position Manager (1h)</text>
  <text x="80" y="448" fill="#999" font-size="10">• Top 3 cost-viable markets</text>
  <text x="80" y="463" fill="#999" font-size="10">• Open/close SHORT perps on Drift</text>

  <!-- Capital Split -->
  <rect x="440" y="410" width="190" height="70" rx="6" fill="#111118" stroke="#666" stroke-width="1"/>
  <text x="450" y="430" fill="#888" font-size="11" font-weight="bold">Capital Split</text>
  <text x="450" y="450" fill="#40c057" font-size="11">30% → Lending Floor</text>
  <text x="450" y="467" fill="#f0b040" font-size="11">70% → Basis Trades</text>

  <!-- Drift Protocol -->
  <rect x="650" y="410" width="180" height="70" rx="6" fill="#111118" stroke="#333" stroke-width="1"/>
  <text x="660" y="430" fill="#888" font-size="11" font-weight="bold">Drift Protocol v2</text>
  <text x="660" y="448" fill="#999" font-size="10">• Perp markets</text>
  <text x="660" y="463" fill="#999" font-size="10">• Funding collection</text>

  <!-- Arrows between internal -->
  <line x1="445" y1="390" x2="245" y2="410" stroke="#444" stroke-dasharray="4,4"/>
  <line x1="710" y1="390" x2="610" y2="410" stroke="#444" stroke-dasharray="4,4"/>

  <!-- Data flows -->
  <text x="70" y="510" fill="#444" font-size="10">Data: Drift API (funding rates, OHLC candles) | RPC: QuickNode | Tick: 30s</text>

  <!-- Legend -->
  <rect x="70" y="530" width="12" height="12" rx="2" fill="#e03131"/>
  <text x="88" y="541" fill="#888" font-size="10">Emergency</text>
  <rect x="170" y="530" width="12" height="12" rx="2" fill="#5fb3d4"/>
  <text x="188" y="541" fill="#888" font-size="10">Vol Analysis</text>
  <rect x="280" y="530" width="12" height="12" rx="2" fill="#40c057"/>
  <text x="298" y="541" fill="#888" font-size="10">Funding</text>
  <rect x="370" y="530" width="12" height="12" rx="2" fill="#f0b040"/>
  <text x="388" y="541" fill="#888" font-size="10">Trading</text>
</svg>
